            "COMBUSTIVEL": "FLEX",
            "SITUACAO_VEICULO": "EM CIRCULACAO",
            "RESTRICAO1": "SEM RESTRICAO"
          }
        },
        "PRECIFICADORFIPE": {
          "DESCRICAORETORNO": "SUCESSO",
          "REGISTRO_1": {
            "CODIGOFIPE": "005843-1",
            "FABRICANTEFIPE": "VW - VOLKSWAGEN",
            "MODELOFIPE": "GOL 1.0 FLEX 4P",
            "PRECOFIPE": "32.500,00",
            "VIGENCIA": "06/2026"
          }
        },
        "VEICULOSBDRP": {
