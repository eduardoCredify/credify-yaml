    ## Lógica de Resposta (Vetor de Status)

    <Tip>
    O array `RESPOSTA.CODIGO` funciona como um **sumário de integridade posicional**: cada posição do array corresponde a uma integração, permitindo identificar rapidamente quais blocos retornaram dados válidos sem percorrer todo o JSON.
    </Tip>

    | Código | Descrição |
    |--------|-----------|
    | `1` | Bloco processado com sucesso e contém dados. |
    | `2` | Bloco processado, mas não foram encontrados dados para o documento consultado. |
    | `3` | Bloco processado, mas ocorreu um erro no retorno dos dados. |

    ## Exemplos de Resposta

    <Tabs>
    <Tab title="✅ Veículo Encontrado">

    ```json
    {
      "CONSULTA": {
        "CODIGORESPOSTA": "100000001",
        "DATAHORA": "01/01/2026 10:00:00",
        "LOGON": "00000",
        "IDCONSULTA": "467"
      },
      "RESPOSTA": {
        "CODIGO": ["1", "2", "2", "2", "1", "1", "1", "1"],
        "INDICIOSINISTROVEICULAR": {
          "DESCRICAORETORNO": "Sucesso",
          "INDICIODESINISTRO": "0"
        },
        "RECALL": { "DESCRICAORETORNO": "NAO FOI POSSIVEL LOCALIZAR O VEICULO." },
        "HISTORICOROUBOFURTO": { "DESCRICAORETORNO": "O VEÍCULO NÃO FOI APRESENTADO NO HISTÓRICO DE ROUBO OU FURTO." },
        "LEILAOCONJUGADO": { "DESCRICAORETORNO": "O VEÍCULO NÃO FOI APRESENTADO NA BASE DE LEILÃO." },
        "VEICULARBNACIONAL": {
          "REGISTRO_1": {
            "MARCA": "VW",
            "MODELO": "VW/GOL 1.0",
            "ANO_FABRICACAO": "2015",
            "ANO_MODELO": "2016",
            "CHASSI": "9BWZZZ377VT004251",
