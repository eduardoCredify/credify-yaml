post:
  operationId: consultarVeiculoTotal
  tags: [Consulta Veicular]
  summary: Veículo Total
  description: |
    A **Consulta Veículo Total** entrega uma análise completa de um veículo a partir da placa, consolidando em uma única chamada **8 integrações** com as principais bases públicas e regulatórias do Brasil. Cada bloco do retorno representa uma fonte de dados independente, permitindo que sua plataforma avalie com precisão a situação real do veículo.

    <Note>
    Indicada para processos de **vistoria, financiamento, seguro e compra e venda de veículos**.
    </Note>

    ## Integrações que compõem este produto

    | Integração | O que entrega |
    |:-----------|:--------------|
    | `VEICULARBNACIONAL` | Dados fabris: marca, modelo, chassi, RENAVAM, situação e restrições |
    | `HISTORICOPROPRIETARIO` | Cadeia completa de proprietários com CPF/CNPJ e ano de exercício |
    | `VEICULOSBDRP` | Débitos (IPVA, multa, licenciamento, DPVAT), restrições ativas e comunicação de venda |
    | `PRECIFICADORFIPE` | Código FIPE, preço de referência e preço médio com vigência |
    | `INDICIOSINISTROVEICULAR` | Indício de sinistro veicular — `0` = sem indício |
    | `HISTORICOROUBOFURTO` | Ocorrências de roubo ou furto em bases policiais |
    | `LEILAOCONJUGADO` | Histórico de participação em leilões conjugados |
    | `RECALL` | Recall ativo ou pendente junto ao fabricante |

    ### 🏭 Informações Fabris — VEICULARBNACIONAL
    Dados cadastrais completos provenientes do Banco Nacional de Dados Veiculares (DENATRAN):
    - Marca, modelo, ano de fabricação e ano do modelo
    - Chassi, RENAVAM, placa e placa padrão Mercosul
    - Cor, combustível, potência e cilindrada
    - Tipo, espécie, carroceria e número de passageiros
    - Situação do veículo (ex: `EM CIRCULACAO`)
    - Restrições cadastrais (RESTRICAO1 a RESTRICAO4) e data de emplacamento

    ### 👥 Histórico de Proprietários — HISTORICOPROPRIETARIO
    Rastreio completo da cadeia de propriedade do veículo desde sua origem:
    - Nome completo e CPF/CNPJ de cada proprietário (pessoa física ou jurídica)
    - Ano de exercício e data de processamento por ocorrência
    - Identificação de todas as transferências de titularidade

    ### 📋 Situação, Débitos e Restrições — VEICULOSBDRP
    Dados atualizados do BDRP (Base de Dados de Registro de Proprietários) com a situação completa do veículo:
    - Débitos de IPVA, multas, licenciamento e DPVAT com valores detalhados
    - Restrições financeiras, judiciais, administrativas, tributárias e ambientais
    - Situação de roubo/furto, guincho e RENAJUD
    - Comunicação de venda ativa: dados do comprador, data e protocolo DETRAN
    - Inspeção veicular ambiental

    ### 💰 Precificação FIPE — PRECIFICADORFIPE
    Valor de mercado atualizado com a tabela FIPE vigente:
    - Código FIPE, fabricante e descrição completa do modelo
    - Preço de referência FIPE e preço médio de mercado
    - Mês e ano de vigência da tabela consultada

    ### ⚠️ Indício de Sinistro — INDICIOSINISTROVEICULAR
    Verifica se há indícios de sinistro veicular registrados para o chassi consultado.
    Campo `INDICIODESINISTRO`: `0` = sem indício, `1` = indício identificado.

    ### 🚨 Histórico de Roubo e Furto — HISTORICOROUBOFURTO
    Consulta ocorrências de roubo ou furto registradas para o veículo nas bases policiais.

    ### 🏷️ Leilão — LEILAOCONJUGADO
    Verifica se o veículo possui histórico de participação em leilões conjugados.

    ### 🔔 Recall — RECALL
    Consulta junto ao fabricante se o veículo possui recall ativo ou pendente de execução.

    ## TABELA DE CAMPOS DE REQUISIÇÃO

    | **Campo** | **Descrição** | **Formato** | **Obrigatório** |
    |-----------|---------------|-------------|-----------------|
    | **IdConsulta** | Identificador da consulta. | string | Sim |
    | **Placa** | Placa do veículo a ser consultado. | string | Sim |

    <AccordionGroup>

    <Accordion title="Cabeçalho da Resposta — CONSULTA">

    | **Campo** | **Descrição** | **Formato** |
    |:----------|:--------------|:------------|
    | **CONSULTA.CODIGORESPOSTA** | Número do protocolo de retorno gerado pelo servidor da API. | string |
    | **CONSULTA.DATAHORA** | Data e hora exata em que o processamento foi concluído. | string |
    | **CONSULTA.LOGON** | Código de identificação da credencial de acesso que realizou a chamada. | string |
    | **CONSULTA.IDCONSULTA** | Código identificador retornado para conciliação com o enviado na requisição. | string |
    | **CODIGO** | Array com os códigos de status de cada base consultada (1 = Sucesso, 2 = Não Encontrado, 3 = Erro). | array |

    </Accordion>

