        schema:
          type: object
          required: [Consulta]
          properties:
            Consulta:
              type: object
              required: [IdConsulta, Placa]
              properties:
                IdConsulta:
                  type: string
                  description: Identificador da consulta.
                  example: "467"
                Placa:
                  type: string
                  description: Placa do veículo no formato AAA0000 (antigo) ou AAA0A00 (Mercosul).
                  example: "ABC1234"

