                          MUNICIPIO: "NAO INFORMADO"
                          ANO_EXERCICIO: "2024"
                          PLACA: "ABC1234"
                          RENAVAM: "00123456789"
                          CHASSI: "9BWZZZ377VT004251"
                          CGC_CPF: "12345678900"
