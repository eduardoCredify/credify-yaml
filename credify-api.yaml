            CHASSI: { type: string }
            CODIGOFIPE: { type: string }
            FABRICANTEFIPE: { type: string }
            MODELOFIPE: { type: string }
            ANOMODELOFIPE: { type: string }
            COMBUSTIVELFIPE: { type: string }
            PRECOFIPE: { type: string }
            PRECOMEDIO: { type: string }
            VIGENCIA: { type: string }

    VeiculosBDRP:
      type: object
      properties:
        DESCRICAORETORNO: { type: string }
        RETORNO:
          type: object
          properties:
            EXISTE_ERRO: { type: string }
            MSG_ERRO: { type: string }
            SITUACAOVEICULO: { type: string }
            PLACA: { type: string }
            MUNICIPIO: { type: string }
            UF: { type: string }
            RENAVAM: { type: string }
            CPF_CNPJ_PROPRIETARIO: { type: string }
            TIPODOCUMENTOPROPRIETARIO: { type: string }
            PRONOME: { type: string }
            LICDATA: { type: string }
            DATAEMISSAOCRV: { type: string }
            CHASSI: { type: string }
            MARCAMODELOCOMPLETO: { type: string }
            MARCA: { type: string }
            MODELO: { type: string }
            VEIANOFABR: { type: string }
            VEIANOMODELO: { type: string }
            COR: { type: string }
            COMBUSTIVEL: { type: string }
            POTENCIA: { type: string }
            CILINDRADA: { type: string }
            RESTRICAOFINAN: { type: string }
            EXISTEDEBITODEIPVA: { type: string }
            EXISTEDEBITOMULTA: { type: string }
            DEBIPVA: { type: string }
            EXISTEDEBITODELICENCIAMENTO: { type: string }
            VALORTOTALDEBITOMULTA: { type: string }
            EXISTEDEBITODEDPVAT: { type: string }
            DPVAT: { type: string }
            RESFURTO: { type: string }
            RESGUINCHO: { type: string }
            RESADMINISTRATIVA: { type: string }
            RESJUDICIAL: { type: string }
            RESTRIBUTARIA: { type: string }
            RESRENAJUD: { type: string }
            RESAMBIENTAL: { type: string }
            CCOMUNICACAOVENDA: { type: string }
            DATA: { type: string }
            HORA: { type: string }

    MensagemRetorno:
      type: object
      properties:
        MSG: { type: string }

    AuthRequest:
      type: object
      required: [client_id, client_secret]
      properties:
        client_id:
          type: string
          example: "seu-client-id"
        client_secret:
          type: string
          example: "seu-client-secret"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          example: 86400

    PlacaRequest:
      type: object
      required: [placa]
      properties:
        placa:
          type: string
          example: "ABC1234"

    CpfRequest:
      type: object
      required: [cpf]
      properties:
        cpf:
          type: string
          example: "000.000.000-00"

    CnpjRequest:
      type: object
      required: [cnpj]
      properties:
        cnpj:
          type: string
          example: "00.000.000/0001-00"

    CpfCnpjRequest:
      type: object
      properties:
        cpf:
          type: string
          example: "000.000.000-00"
        cnpj:
          type: string
          example: "00.000.000/0001-00"

    RenavamRequest:
      type: object
      required: [renavam]
      properties:
        renavam:
          type: string
          example: "00000000000"

    CepRequest:
      type: object
      required: [cep]
      properties:
        cep:
          type: string
          example: "01310-100"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Unauthorized"
        code:
          type: integer
          example: 401

paths:

  # ─────────────────────────────────────────────
  # 1. Autenticacao e Integracao Tecnica
  # ─────────────────────────────────────────────

  /auth:
    post:
      tags: [Autenticacao e Integracao Tecnica]
      summary: Autenticação
      description: >
        Gera um token JWT válido por 24 horas. Use o ClientID e ClientSecret
        fornecidos pela Credify.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            example:
              client_id: "seu-client-id"
              client_secret: "seu-client-secret"
      responses:
        '200':
          description: Token gerado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sso:
    post:
      tags: [Autenticacao e Integracao Tecnica]
      summary: SSO
      description: Autenticação via Single Sign-On.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token_sso:
                  type: string
                  example: "sso-token-aqui"
      responses:
        '200':
          description: Sucesso

  /webhook:
    post:
      tags: [Autenticacao e Integracao Tecnica]
      summary: Webhook (Decisionfy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  example: "https://seudominio.com/webhook"
                evento:
                  type: string
                  example: "consulta.finalizada"
      responses:
        '200':
          description: Sucesso

  # ─────────────────────────────────────────────
  # Consulta Veicular
  # ─────────────────────────────────────────────

  /veiculototal:
    post:
      tags: [Consulta Veicular]
      summary: Veículo Total
      description: |
        Retorna informações completas sobre um veículo a partir da placa, incluindo dados cadastrais, histórico de proprietários, situação de roubo/furto, leilão, recall, indício de sinistro e precificação FIPE.

        > **Atenção:** este endpoint agrega múltiplas fontes e consome mais créditos por consulta.

        ## Códigos de retorno (campo CODIGO)

        | Código | Significado |
        |--------|-------------|
        | `1` | Sucesso |
        | `2` | Dado não encontrado na base de dados |
        | `3` | Erro na consulta |

        ## Blocos de resposta

        | Bloco | Descrição |
        |-------|-----------|
        | `INDICIOSINISTROVEICULAR` | Indica se o veículo possui histórico de sinistro |
        | `RECALL` | Informações de recall do fabricante |
        | `HISTORICOROUBOFURTO` | Histórico de ocorrências de roubo ou furto |
        | `LEILAOCONJUGADO` | Indica se o veículo passou por leilão |
        | `HISTORICOPROPRIETARIO` | Lista de proprietários anteriores e atual |
        | `VEICULARBNACIONAL` | Dados cadastrais completos do DETRAN nacional |
        | `PRECIFICADORFIPE` | Precificação FIPE vigente |
        | `VEICULOSBDRP` | Dados do BDRP com débitos, restrições e situação |

        > **Formato da placa:** use **AAA0000** (padrão antigo) ou **AAA0A00** (padrão Mercosul).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Consulta:
                  type: object
                  required:
                    - IdConsulta
                    - Placa
                  properties:
                    IdConsulta:
                      type: string
                      example: "467"
                    Placa:
                      type: string
                      example: "ABC1234"
      responses:
        '200':
          description: |
            Resposta da consulta:
            * Código 1: Sucesso.
            * Código 2: Dado não encontrado na base de dados.
            * Código 3: Erro na consulta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaVeiculoTotal'
              examples:
                Consulta Sucesso:
                  value:
                    CONSULTA:
                      CODIGORESPOSTA: "100000001"
                      DATAHORA: "01/01/2026 10:00:00"
                      LOGON: "00000"
                      IDCONSULTA: "467"
                    RESPOSTA:
                      CODIGO: ["1","2","2","2","1","1","1","1"]
                      INDICIOSINISTROVEICULAR:
                        DESCRICAORETORNO: "Sucesso"
                        INDICIODESINISTRO: "0"
                      RECALL:
                        DESCRICAORETORNO: "NAO FOI POSSIVEL LOCALIZAR O VEICULO."
                      HISTORICOROUBOFURTO:
                        DESCRICAORETORNO: "O VEÍCULO NÃO FOI APRESENTADO NO HISTÓRICO DE ROUBO OU FURTO."
                      LEILAOCONJUGADO:
