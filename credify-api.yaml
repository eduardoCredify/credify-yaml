      tags: [Outros]
      summary: Documentoscopia de Documentos de Identificação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imagem_base64:
                  type: string
                  example: "base64encodedimage"
      responses:
        '200':
          description: Sucesso

  /sso:
    post:
      tags: [Outros]
      summary: SSO
      description: Autenticação via Single Sign-On.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token_sso:
                  type: string
                  example: "sso-token-aqui"
      responses:
        '200':
          description: Sucesso

  /webhook:
    post:
      tags: [Outros]
      summary: Webhook (Decisionfy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  example: "https://seudominio.com/webhook"
                evento:
                  type: string
                  example: "consulta.finalizada"
      responses:
        '200':
          description: Sucesso

  /sintegra:
    post:
      tags: [Outros]
      summary: API Sintegra
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CnpjRequest'
      responses:
        '200':
          description: Sucesso

  /fgts:
    post:
      tags: [Outros]
      summary: API FGTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CpfRequest'
      responses:
        '200':
          description: Sucesso

tags:
  - name: Auth
    description: Autenticação e geração de token JWT
  - name: Veiculares - Serviços
    description: Serviços de documentação veicular (ECRLV)
  - name: Veiculares
    description: Consultas veiculares - placa, CNH, histórico, leilão, FIPE e mais
  - name: Relatório Jurídico
    description: Processos judiciais - totalizadores e detalhes de processos
  - name: Marketing
    description: Geração de leads por CEP, UF e município
  - name: Cadastral PF
    description: Dados cadastrais de Pessoa Física via CPF
  - name: Cadastral PJ
    description: Dados cadastrais de Pessoa Jurídica via CNPJ
  - name: KYC
    description: Know Your Customer - compliance, sanções, RH e BET
  - name: Background Checks e Antifraude
    description: Verificações de risco, fraude, biometria, score e validações
  - name: Outros
    description: Documentoscopia, SSO, Webhook, Sintegra e FGTS
