openapi: 3.1.0
info:
  title: Credify API
  version: 1.1.0
  description: >
    Documentação da API Credify. Autentique-se com ClientID e ClientSecret para
    obter o token JWT (válido 24h) e utilize nas demais requisições.
  contact:
    name: Credify
    url: https://credify.com.br

servers:
  - url: https://api.credify.com.br
    description: Produção

security:
  - BearerAuth: []

x-tagGroups:
  - name: "1. Autenticacao e Integracao Tecnica"
    tags:
      - Autenticacao e Integracao Tecnica
  - name: "2. Veículos e Mobilidade"
    tags:
      - Consulta Veicular
      - Restricoes e Gravames
      - Risco e Sinistro
  - name: "3. CNH e Condutores"
    tags:
      - CNH e Condutores
  - name: "4. Cadastral Pessoa Física"
    tags:
      - Enriquecimento PF
      - Receita Federal PF
      - Scores PF
  - name: "5. Cadastral Pessoa Jurídica"
    tags:
      - Enriquecimento PJ
      - Receita Federal PJ
      - Quadro Societario
      - Indicadores PJ
  - name: "6. Jurídico, Processos e Restrições"
    tags:
      - Relatorio Juridico
      - Restricoes e Apontamentos
  - name: "7. KYC, Compliance e Background Check"
    tags:
      - Produtos KYC
      - Exposicao Publica
      - Background Check
  - name: "8. Antifraude, Validações e Autenticação de Dados"
    tags:
      - Validacao Cadastral
      - Cartao e BIN
      - Biometria Facial
      - Documentoscopia
  - name: "9. Marketing e Leads"
    tags:
      - Marketing e Leads

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    RespostaVeiculoTotal:
      type: object
      properties:
        CONSULTA:
          type: object
          properties:
            CODIGORESPOSTA: { type: string }
            DATAHORA: { type: string }
            LOGON: { type: string }
            IDCONSULTA: { type: string }
        RESPOSTA:
          type: object
          properties:
            CODIGO:
              type: array
              items: { type: string }
            INDICIOSINISTROVEICULAR:
              $ref: '#/components/schemas/IndiciSinistro'
            RECALL:
              $ref: '#/components/schemas/DescricaoSimples'
            HISTORICOROUBOFURTO:
              $ref: '#/components/schemas/DescricaoSimples'
            LEILAOCONJUGADO:
              $ref: '#/components/schemas/DescricaoSimples'
            HISTORICOPROPRIETARIO:
              $ref: '#/components/schemas/HistoricoProprietario'
            VEICULARBNACIONAL:
              $ref: '#/components/schemas/VeicularBNacional'
            PRECIFICADORFIPE:
              $ref: '#/components/schemas/PrecificadorFipe'
            VEICULOSBDRP:
              $ref: '#/components/schemas/VeiculosBDRP'
            DADOS:
              $ref: '#/components/schemas/MensagemRetorno'

    IndiciSinistro:
      type: object
      properties:
        DESCRICAORETORNO: { type: string }
        INDICIODESINISTRO: { type: string }

    DescricaoSimples:
      type: object
      properties:
        DESCRICAORETORNO: { type: string }

    RegistroProprietario:
      type: object
      properties:
        CHAVERETORNO: { type: string }
        OCORRENCIA: { type: string }
        UF_DUT: { type: string }
        CODIGOMUNICIPIO: { type: string }
        MUNICIPIO: { type: string }
        ANO_EXERCICIO: { type: string }
        PLACA: { type: string }
        RENAVAM: { type: string }
        CHASSI: { type: string }
        CGC_CPF: { type: string }
        NOME_PROPRIETARIO: { type: string }
        TIPO_DOCUMENTO: { type: string }
        CORRECAO_CHASSI_RENAVAM: { type: string }
        DATA_PROCESSAMENTO: { type: string }
        HORA_PROCESSAMENTO: { type: string }
        MOTIVO_TIPO_AUTORIZACAO: { type: string }

    HistoricoProprietario:
      type: object
      properties:
        DESCRICAORETORNO: { type: string }
        REGISTRO_1:
          $ref: '#/components/schemas/RegistroProprietario'
        REGISTRO_2:
          $ref: '#/components/schemas/RegistroProprietario'
        REGISTRO_3:
          $ref: '#/components/schemas/RegistroProprietario'

    VeicularBNacional:
      type: object
      properties:
        REGISTRO_1:
          type: object
          properties:
            DATA_EMPLACAMENTO: { type: string }
            CHASSI: { type: string }
            PLACA: { type: string }
            PLACA_MODELO_NOVO: { type: string }
            RENAVAM: { type: string }
            IDENTIFICACAO_FATURADO: { type: string }
            UF_DO_FATURADO: { type: string }
            TIPO_PROPRIETARIO: { type: string }
            UF: { type: string }
            MUNICIPIO: { type: string }
            ANO_FABRICACAO: { type: string }
            ANO_MODELO: { type: string }
            MARCA: { type: string }
            MODELO: { type: string }
            TIPO_VEICULO: { type: string }
            ESPECIE_VEICULO: { type: string }
            CARROCERIA: { type: string }
            NUMERO_CARROCERIA: { type: string }
            COR: { type: string }
            COMBUSTIVEL: { type: string }
            POTENCIA: { type: string }
            CILINDRADA: { type: string }
            NUMERO_LUGAR: { type: string }
            QUANTIDADE_PASSAGEIRO: { type: string }
            CAPACIDADE_CARGA: { type: string }
            PESO_BRUTO_TOTAL: { type: string }
            CAPACIDADE_MAXIMA_TRACAO: { type: string }
            PROCEDENCIA_VEICULO: { type: string }
            SITUACAO_CHASSI: { type: string }
            NUMERO_CAIXA_CAMBIO: { type: string }
            NUMERO_EIXO: { type: string }
            NUMERO_MOTOR: { type: string }
            TIPO_MONTAGEM: { type: string }
            ULTIMA_ATUALIZACAO: { type: string }
            RESTRICAO1: { type: string }
            RESTRICAO2: { type: string }
            RESTRICAO3: { type: string }
            RESTRICAO4: { type: string }
            SITUACAO_VEICULO: { type: string }
            NACIONALIDADE: { type: string }

    PrecificadorFipe:
