openapi: 3.1.0
info:
  title: Credify API
  version: 1.1.0
  description: >
    Documentação da API Credify. Autentique-se com ClientID e ClientSecret para
    obter o token JWT (válido 24h) e utilize nas demais requisições.
  contact:
    name: Credify
    url: https://credify.com.br

servers:
  - url: https://api.credify.com.br
    description: Produção

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    RespostaVeiculoTotal:
      type: object
      properties:
        CONSULTA:
          type: object
          properties:
            CODIGORESPOSTA: { type: string }
            DATAHORA: { type: string }
            LOGON: { type: string }
            IDCONSULTA: { type: string }
        RESPOSTA:
          type: object
          properties:
            CODIGO:
              type: array
              items: { type: string }
            INDICIOSINISTROVEICULAR:
              $ref: '#/components/schemas/IndiciSinistro'
            RECALL:
              $ref: '#/components/schemas/DescricaoSimples'
            HISTORICOROUBOFURTO:
              $ref: '#/components/schemas/DescricaoSimples'
            LEILAOCONJUGADO:
              $ref: '#/components/schemas/DescricaoSimples'
            HISTORICOPROPRIETARIO:
              $ref: '#/components/schemas/HistoricoProprietario'
            VEICULARBNACIONAL:
              $ref: '#/components/schemas/VeicularBNacional'
            PRECIFICADORFIPE:
              $ref: '#/components/schemas/PrecificadorFipe'
            VEICULOSBDRP:
              $ref: '#/components/schemas/VeiculosBDRP'
            DADOS:
              $ref: '#/components/schemas/MensagemRetorno'

    IndiciSinistro:
      type: object
      properties:
        DESCRICAORETORNO: { type: string }
        INDICIODESINISTRO: { type: string }

    DescricaoSimples:
      type: object
      properties:
        DESCRICAORETORNO: { type: string }

    RegistroProprietario:
      type: object
      properties:
        CHAVERETORNO: { type: string }
        OCORRENCIA: { type: string }
        UF_DUT: { type: string }
        CODIGOMUNICIPIO: { type: string }
        MUNICIPIO: { type: string }
        ANO_EXERCICIO: { type: string }
        PLACA: { type: string }
        RENAVAM: { type: string }
        CHASSI: { type: string }
        CGC_CPF: { type: string }
        NOME_PROPRIETARIO: { type: string }
        TIPO_DOCUMENTO: { type: string }
        CORRECAO_CHASSI_RENAVAM: { type: string }
        DATA_PROCESSAMENTO: { type: string }
        HORA_PROCESSAMENTO: { type: string }
        MOTIVO_TIPO_AUTORIZACAO: { type: string }

    HistoricoProprietario:
      type: object
      properties:
        DESCRICAORETORNO: { type: string }
        REGISTRO_1:
          $ref: '#/components/schemas/RegistroProprietario'
        REGISTRO_2:
          $ref: '#/components/schemas/RegistroProprietario'
        REGISTRO_3:
          $ref: '#/components/schemas/RegistroProprietario'

    VeicularBNacional:
      type: object
      properties:
        REGISTRO_1:
          type: object
          properties:
            DATA_EMPLACAMENTO: { type: string }
            CHASSI: { type: string }
            PLACA: { type: string }
            PLACA_MODELO_NOVO: { type: string }
            RENAVAM: { type: string }
            IDENTIFICACAO_FATURADO: { type: string }
            UF_DO_FATURADO: { type: string }
            TIPO_PROPRIETARIO: { type: string }
            UF: { type: string }
            MUNICIPIO: { type: string }
            ANO_FABRICACAO: { type: string }
            ANO_MODELO: { type: string }
            MARCA: { type: string }
            MODELO: { type: string }
            TIPO_VEICULO: { type: string }
            ESPECIE_VEICULO: { type: string }
            CARROCERIA: { type: string }
            NUMERO_CARROCERIA: { type: string }
            COR: { type: string }
            COMBUSTIVEL: { type: string }
            POTENCIA: { type: string }
            CILINDRADA: { type: string }
            NUMERO_LUGAR: { type: string }
            QUANTIDADE_PASSAGEIRO: { type: string }
            CAPACIDADE_CARGA: { type: string }
            PESO_BRUTO_TOTAL: { type: string }
            CAPACIDADE_MAXIMA_TRACAO: { type: string }
            PROCEDENCIA_VEICULO: { type: string }
            SITUACAO_CHASSI: { type: string }
            NUMERO_CAIXA_CAMBIO: { type: string }
            NUMERO_EIXO: { type: string }
            NUMERO_MOTOR: { type: string }
            TIPO_MONTAGEM: { type: string }
            ULTIMA_ATUALIZACAO: { type: string }
            RESTRICAO1: { type: string }
            RESTRICAO2: { type: string }
            RESTRICAO3: { type: string }
            RESTRICAO4: { type: string }
            SITUACAO_VEICULO: { type: string }
            NACIONALIDADE: { type: string }

    PrecificadorFipe:
      type: object
      properties:
        DESCRICAORETORNO: { type: string }
        REGISTRO_1:
          type: object
          properties:
            STATUS: { type: string }
            CHASSI: { type: string }
            CODIGOFIPE: { type: string }
            FABRICANTEFIPE: { type: string }
            MODELOFIPE: { type: string }
            ANOMODELOFIPE: { type: string }
            COMBUSTIVELFIPE: { type: string }
            PRECOFIPE: { type: string }
            PRECOMEDIO: { type: string }
            VIGENCIA: { type: string }

    VeiculosBDRP:
      type: object
      properties:
        DESCRICAORETORNO: { type: string }
        RETORNO:
          type: object
          properties:
            EXISTE_ERRO: { type: string }
            MSG_ERRO: { type: string }
            SITUACAOVEICULO: { type: string }
            PLACA: { type: string }
            MUNICIPIO: { type: string }
            UF: { type: string }
            RENAVAM: { type: string }
            CPF_CNPJ_PROPRIETARIO: { type: string }
            TIPODOCUMENTOPROPRIETARIO: { type: string }
            PRONOME: { type: string }
            LICDATA: { type: string }
            DATAEMISSAOCRV: { type: string }
            CHASSI: { type: string }
            MARCAMODELOCOMPLETO: { type: string }
            MARCA: { type: string }
            MODELO: { type: string }
            VEIANOFABR: { type: string }
            VEIANOMODELO: { type: string }
            COR: { type: string }
            COMBUSTIVEL: { type: string }
            POTENCIA: { type: string }
            CILINDRADA: { type: string }
            RESTRICAOFINAN: { type: string }
            EXISTEDEBITODEIPVA: { type: string }
            EXISTEDEBITOMULTA: { type: string }
            DEBIPVA: { type: string }
            EXISTEDEBITODELICENCIAMENTO: { type: string }
            VALORTOTALDEBITOMULTA: { type: string }
            EXISTEDEBITODEDPVAT: { type: string }
            DPVAT: { type: string }
            RESFURTO: { type: string }
            RESGUINCHO: { type: string }
            RESADMINISTRATIVA: { type: string }
            RESJUDICIAL: { type: string }
            RESTRIBUTARIA: { type: string }
            RESRENAJUD: { type: string }
            RESAMBIENTAL: { type: string }
            CCOMUNICACAOVENDA: { type: string }
            DATA: { type: string }
            HORA: { type: string }

    MensagemRetorno:
      type: object
      properties:
        MSG: { type: string }

    AuthRequest:
      type: object
      required: [client_id, client_secret]
      properties:
        client_id:
          type: string
          example: "seu-client-id"
        client_secret:
          type: string
          example: "seu-client-secret"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          example: 86400

    PlacaRequest:
      type: object
      required: [placa]
      properties:
        placa:
          type: string
          example: "ABC1234"

    CpfRequest:
      type: object
      required: [cpf]
      properties:
        cpf:
          type: string
          example: "000.000.000-00"

    CnpjRequest:
      type: object
      required: [cnpj]
      properties:
        cnpj:
          type: string
          example: "00.000.000/0001-00"

    CpfCnpjRequest:
      type: object
      properties:
        cpf:
          type: string
          example: "000.000.000-00"
        cnpj:
          type: string
          example: "00.000.000/0001-00"

    RenavamRequest:
      type: object
      required: [renavam]
      properties:
        renavam:
          type: string
          example: "00000000000"

    CepRequest:
      type: object
      required: [cep]
      properties:
        cep:
          type: string
          example: "01310-100"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Unauthorized"
        code:
          type: integer
          example: 401

paths:

  # ─────────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────────

  /auth:
    post:
      tags: [Auth]
      summary: Autenticação
      description: >
        Gera um token JWT válido por 24 horas. Use o ClientID e ClientSecret
        fornecidos pela Credify.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            example:
              client_id: "seu-client-id"
              client_secret: "seu-client-secret"
      responses:
        '200':
          description: Token gerado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────────
  # VEICULARES - SERVIÇOS
  # ─────────────────────────────────────────────

  /ecrlv:
    post:
      tags: [Veiculares - Serviços]
      summary: ECRLV
      description: Extrato do CRLV digital. Suporta primeira e segunda requisição.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlacaRequest'
      responses:
        '200':
          description: Sucesso
        '401':
          description: Não autorizado

  # ─────────────────────────────────────────────
  # VEICULARES
  # ─────────────────────────────────────────────

  /veiculototal:
    post:
      tags: [Veiculares]
      summary: Consulta completa de dados veiculares
      description: |
        Retorna informações completas sobre um veículo a partir da placa, incluindo dados cadastrais, histórico de proprietários, situação de roubo/furto, leilão, recall, indício de sinistro e precificação FIPE.

        > **Atenção:** este endpoint agrega múltiplas fontes e consome mais créditos por consulta.

        ## Códigos de retorno (campo CODIGO)

        | Código | Significado |
        |--------|-------------|
        | `1` | Sucesso |
        | `2` | Dado não encontrado na base de dados |
        | `3` | Erro na consulta |

        ## Blocos de resposta

        | Bloco | Descrição |
        |-------|-----------|
        | `INDICIOSINISTROVEICULAR` | Indica se o veículo possui histórico de sinistro |
        | `RECALL` | Informações de recall do fabricante |
        | `HISTORICOROUBOFURTO` | Histórico de ocorrências de roubo ou furto |
        | `LEILAOCONJUGADO` | Indica se o veículo passou por leilão |
        | `HISTORICOPROPRIETARIO` | Lista de proprietários anteriores e atual |
        | `VEICULARBNACIONAL` | Dados cadastrais completos do DETRAN nacional |
        | `PRECIFICADORFIPE` | Precificação FIPE vigente |
        | `VEICULOSBDRP` | Dados do BDRP com débitos, restrições e situação |

        > **Formato da placa:** use **AAA0000** (padrão antigo) ou **AAA0A00** (padrão Mercosul).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Consulta:
                  type: object
                  required:
                    - IdConsulta
                    - Placa
                  properties:
                    IdConsulta:
                      type: string
                      example: "467"
                    Placa:
                      type: string
                      example: "ABC1234"
      responses:
        '200':
          description: |
            Resposta da consulta:
            * Código 1: Sucesso.
            * Código 2: Dado não encontrado na base de dados.
            * Código 3: Erro na consulta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaVeiculoTotal'
              examples:
                Consulta Sucesso:
                  value:
                    CONSULTA:
                      CODIGORESPOSTA: "100000001"
                      DATAHORA: "01/01/2026 10:00:00"
                      LOGON: "00000"
                      IDCONSULTA: "467"
                    RESPOSTA:
                      CODIGO: ["1","2","2","2","1","1","1","1"]
                      INDICIOSINISTROVEICULAR:
                        DESCRICAORETORNO: "Sucesso"
                        INDICIODESINISTRO: "0"
                      RECALL:
                        DESCRICAORETORNO: "NAO FOI POSSIVEL LOCALIZAR O VEICULO."
                      HISTORICOROUBOFURTO:
                        DESCRICAORETORNO: "O VEÍCULO NÃO FOI APRESENTADO NO HISTÓRICO DE ROUBO OU FURTO."
                      LEILAOCONJUGADO:
                        DESCRICAORETORNO: "O VEÍCULO NÃO FOI APRESENTADO NA BASE DE LEILÃO."
                      HISTORICOPROPRIETARIO:
                        DESCRICAORETORNO: "SUCESSO"
                        REGISTRO_1:
                          CHAVERETORNO: "010101010101010"
                          OCORRENCIA: "1"
                          UF_DUT: ""
